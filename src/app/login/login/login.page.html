<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Connexion</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="auth-container">
    <h1 class="auth-title">Kahoute</h1>
    <p class="auth-subtitle">Quiz & Apprentissage</p>

    <form (ngSubmit)="login()">
      <ion-item>
        <ion-label position="floating">Email</ion-label>
        <ion-input type="email" [(ngModel)]="email" name="email" required>
        </ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Mot de passe</ion-label>
        <ion-input
          type="password"
          [(ngModel)]="password"
          name="password"
          required
        >
        </ion-input>
      </ion-item>

      <ion-button
        expand="block"
        type="submit"
        class="ion-margin-top"
        [disabled]="isLoading"
      >
        {{ isLoading ? 'Connexion en cours...' : 'Se connecter' }}
      </ion-button>
    </form>

    <ion-text color="danger" *ngIf="errorMessage">
      <p class="ion-padding-top error-message">{{ errorMessage }}</p>
    </ion-text>

    <div class="auth-footer">
      <p>
        Vous n'avez pas de compte?
        <ion-button fill="clear" size="small" routerLink="/register">
          S'inscrire
        </ion-button>
      </p>
    </div>
  </div>
</ion-content>
