<ion-header>
  <ion-toolbar>
    <ion-title>Salle d'attente</ion-title>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <h2>Code PIN: {{ pin }}</h2>

  <h3>Joueurs :</h3>
  <ion-list>
    <ion-item *ngFor="let player of players">
      {{ player.name }}
    </ion-item>
  </ion-list>

  <ion-button *ngIf="isHost" expand="block" color="success" (click)="startGame()">
    Démarrer le jeu
  </ion-button>
</ion-content>
