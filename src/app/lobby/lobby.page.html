<app-top-bar 
  title="Salle d'attente"
  [showBackButton]="true"
  [showProfileButton]="true">
</app-top-bar>

<ion-content class="ion-padding">
  <h2>Code PIN: {{ pin }}</h2>

  <h3>Joueurs :</h3>
  <ion-list>
    <ion-item *ngFor="let player of players">
      {{ player.name }}
    </ion-item>
  </ion-list>

  <ion-button *ngIf="isHost" expand="block" color="success" (click)="startGame()">
    Démarrer le jeu
  </ion-button>
</ion-content>
